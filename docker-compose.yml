services:
  postgres:
    image: postgres:16-alpine
    container_name: avatar_torremolinos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: avatar_torremolinos
    ports:
      - "5432:5432"
    volumes:
      - avatar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d avatar_torremolinos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  avatar_pg_data:
